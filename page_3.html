
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>카카오맵 폴리곤 표시 + 거리 계산 + 이동경로 표시 + CSV 저장</title>
    <style>
        #map {
            width:100%;
            height:500px;
        }
        #output {
            margin-top:10px;
            font-size:14px;
            color:#333;
            white-space:pre-line;
        }
    </style>
    <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=5f6ea66cec7c2d446a61f4756b27880b&libraries=services"></script>
</head>
<body>
<div id="map"></div>
<div style="margin-top:10px;">
    <button onclick="map.setMapTypeId(kakao.maps.MapTypeId.ROADMAP)">일반지도</button>
    <button onclick="map.setMapTypeId(kakao.maps.MapTypeId.HYBRID)">위성지도</button>
</div>
<div style="margin-top:10px;">
    <label>X 이동: <input type="number" id="xShift" step="0.000001" value="0"></label>
    <label>Y 이동: <input type="number" id="yShift" step="0.000001" value="0"></label>
    <button onclick="addMovedPolygon()">이동된 폴리곤 추가</button>
    <button onclick="removeMovedPolygons()">이동된 폴리곤 모두 제거</button>
</div>
<div style="margin-top:10px;">
    <button id="toggleBtn" onclick="toggleOriginalPolygons()">기존 폴리곤 없애기</button>
</div>
<div style="margin-top:10px;">
    <button onclick="downloadCSV()">이동경로 CSV 저장하기</button>
</div>
<div id="output"></div>

<script>
    var map = new kakao.maps.Map(document.getElementById('map'), {
        center: new kakao.maps.LatLng(35.7760936661896, 128.142944861149),
        level: 3,
        mapTypeId: kakao.maps.MapTypeId.HYBRID
    });

    var polygons = [[[128.14286844046174, 35.776125634071896], [128.1428656202689, 35.77609066424747], [128.1429474600154, 35.77610703803291], [128.1429928373368, 35.776140896709826], [128.14304111142178, 35.776198496413656], [128.14308132390207, 35.776235463483935], [128.1430977606575, 35.77622904688241], [128.14303872447167, 35.776114980437285], [128.14294193328413, 35.776065614108774], [128.14272847918903, 35.77598423220076], [128.14261921369823, 35.775946159074934], [128.14252911166218, 35.77598645847261], [128.14254471809096, 35.77605313476218], [128.14262834966513, 35.77608593295494], [128.14271217871269, 35.77609420102584], [128.14278003503586, 35.7761120161793], [128.14286844046174, 35.776125634071896]], [[128.1432004298381, 35.77620383320839], [128.1432068042258, 35.77610464428607], [128.14324101476853, 35.77608161866534], [128.14318132708598, 35.77604874844378], [128.14312157739238, 35.77600004314243], [128.14301955400597, 35.77596313959097], [128.14298443325941, 35.776011167778634], [128.1431250811242, 35.776122689475095], [128.1432004298381, 35.77620383320839]]];
    var originalPolygons = [];
    var polygonsVisible = true;
    var movedPolygons = [];

    function drawOriginalPolygons() {
        polygons.forEach(function(points) {
            var path = points.map(function(p) {
                return new kakao.maps.LatLng(p[1], p[0]);
            });

            var polygon = new kakao.maps.Polygon({
                path: path,
                strokeWeight: 2,
                strokeColor: '#FF0000',
                strokeOpacity: 0.8,
                fillColor: '#FF0000',
                fillOpacity: 0.4
            });
            polygon.setMap(map);
            originalPolygons.push(polygon);
        });
    }

    drawOriginalPolygons();

    function toggleOriginalPolygons() {
        if (polygonsVisible) {
            originalPolygons.forEach(function(poly) {
                poly.setMap(null);
            });
            originalPolygons = [];
            polygonsVisible = false;
            document.getElementById("toggleBtn").innerText = "기존 폴리곤 다시 표시";
            document.getElementById("output").innerText = "기존 폴리곤이 제거되었습니다.";
        } else {
            drawOriginalPolygons();
            polygonsVisible = true;
            document.getElementById("toggleBtn").innerText = "기존 폴리곤 없애기";
            document.getElementById("output").innerText = "기존 폴리곤이 다시 표시되었습니다.";
        }
    }

    // === 현재 위치 표시 및 이동 경로 ===
    var currentPath = [];
    var currentPolyline = null;
    var currentMarker = null;
    var trackedData = []; // CSV 저장용 배열

    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(function(position) {
            var lat = position.coords.latitude;
            var lon = position.coords.longitude;
            var loc = new kakao.maps.LatLng(lat, lon);

            var timestamp = new Date().toISOString();
            trackedData.push({
                time: timestamp,
                x: lon.toFixed(6),
                y: lat.toFixed(6)
            });

            if (currentMarker) {
                currentMarker.setPosition(loc);
            } else {
                currentMarker = new kakao.maps.Marker({
                    map: map,
                    position: loc,
                    title: "현재 위치"
                });
            }

            currentPath.push(loc);
            if (currentPolyline) {
                currentPolyline.setMap(null);
            }
            currentPolyline = new kakao.maps.Polyline({
                path: currentPath,
                strokeWeight: 3,
                strokeColor: '#00FF00',
                strokeOpacity: 0.9
            });
            currentPolyline.setMap(map);

            map.setCenter(loc);
        }, function(error) {
            document.getElementById("output").innerText = "현재 위치를 가져올 수 없습니다.";
        }, {
            enableHighAccuracy: true,
            maximumAge: 0,
            timeout: 5000
        });
    } else {
        document.getElementById("output").innerText = "이 브라우저는 위치 정보를 지원하지 않습니다.";
    }

    // CSV 다운로드 함수
    function downloadCSV() {
        if (trackedData.length === 0) {
            alert("저장할 이동경로가 없습니다.");
            return;
        }

        var csvContent = "시간,X좌표,Y좌표\n" + 
            trackedData.map(function(d) {
                return d.time + "," + d.x + "," + d.y;
            }).join("\n");

        var blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
        var url = URL.createObjectURL(blob);

        var a = document.createElement("a");
        a.href = url;
        a.download = "tracked_path.csv";
        a.click();

        URL.revokeObjectURL(url);
    }
</script>
</body>
</html>
