<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>카카오맵 폴리곤 꼭지점 표시 + 거리 계산 (Projection)</title>
    <style>
        #map {width:100%;height:500px;}
        #output {margin-top:10px; font-size:14px; color:#333; white-space:pre-line;}
    </style>
    <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=여기에_JavaScript_키_입력&libraries=services"></script>
</head>
<body>
<div id="map"></div>
<div id="output"></div>

<script>
    var map = new kakao.maps.Map(document.getElementById('map'), {
        center: new kakao.maps.LatLng(35.74129345405312, 128.30947761303523),
        level: 4
    });

    var polygons = [[[128.3093112293493, 35.741273715097414], [128.30944010344737, 35.74127506925067], [128.30952091016962, 35.741394183072686], [128.30956326569438, 35.741399969315545], [128.3096011189366, 35.741383108371345], [128.30966303135818, 35.74135552573449], [128.30958519861818, 35.7412427468447], [128.30958036541836, 35.74124301646289], [128.30944284923675, 35.74122347967842], [128.30938634924354, 35.74122985095963], [128.30932570560128, 35.74122706875228], [128.3093112293493, 35.741273715097414]]];
    var selectedPoints = [];

    // Projection 객체 생성 (TM 좌표계 사용)
    var proj = new kakao.maps.Projection();

    // 폴리곤 및 꼭지점 표시
    polygons.forEach(function(points) {
        var path = points.map(function(p) {
            return new kakao.maps.LatLng(p[1], p[0]); // (lat, lon)
        });

        var polygon = new kakao.maps.Polygon({
            path: path,
            strokeWeight: 2,
            strokeColor: '#FF0000',
            strokeOpacity: 0.8,
            fillColor: '#FF0000',
            fillOpacity: 0.4
        });
        polygon.setMap(map);

        // 꼭지점마다 작은 원(circle) 표시
        path.forEach(function(latlng) {
            var circle = new kakao.maps.Circle({
                center: latlng,
                radius: 20, // 눈에 잘 보이도록 20m 원
                strokeWeight: 1,
                strokeColor: '#000',
                strokeOpacity: 0.8,
                fillColor: '#00FF00',
                fillOpacity: 0.8
            });
            circle.setMap(map);

            // 꼭지점 클릭 이벤트
            kakao.maps.event.addListener(circle, 'click', function() {
                selectedPoints.push(latlng);

                if (selectedPoints.length === 1) {
                    document.getElementById("output").innerText =
                        "첫 번째 꼭지점: X=" + selectedPoints[0].getLng().toFixed(6) +
                        ", Y=" + selectedPoints[0].getLat().toFixed(6);
                }

                if (selectedPoints.length === 2) {
                    // 두 점을 TM 좌표계로 변환
                    var p1 = proj.convertCoords(selectedPoints[0], kakao.maps.ProjectionId.TM);
                    var p2 = proj.convertCoords(selectedPoints[1], kakao.maps.ProjectionId.TM);

                    var xDiff = (p2.x - p1.x);
                    var yDiff = (p2.y - p1.y);
                    var distance = Math.sqrt(xDiff*xDiff + yDiff*yDiff);

                    document.getElementById("output").innerText =
                        "첫 번째 꼭지점: X=" + selectedPoints[0].getLng().toFixed(6) +
                        ", Y=" + selectedPoints[0].getLat().toFixed(6) + "\n" +
                        "두 번째 꼭지점: X=" + selectedPoints[1].getLng().toFixed(6) +
                        ", Y=" + selectedPoints[1].getLat().toFixed(6) + "\n" +
                        "X축 거리: " + xDiff.toFixed(2) + "m\n" +
                        "Y축 거리: " + yDiff.toFixed(2) + "m\n" +
                        "두 꼭지점 실제 거리: " + distance.toFixed(2) + "m";

                    selectedPoints = []; // 초기화
                }
            });
        });
    });
</script>
</body>
</html>
